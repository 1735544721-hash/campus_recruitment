spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_recruitment?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: root
    password: jx152523
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
  jackson:
    default-property-inclusion: non_empty
  ai:
    ollama:
      chat:
        model: llama3.2:latest
      base-url: http://localhost:11434
    openai:
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3
        completions-path: /v1/chat/completions
      api-key: your-api-key
      base-url: https://api.siliconflow.cn
server:
  port: 1235
  servlet:
    context-path: /

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: org.example.springboot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload:
    path: ./files
    url-prefix: /api/files

# JWT配置
jwt:
  secret: your-secret-key
  expiration: 86400000  # 24小时

user:
  defaultPassword: 123456





